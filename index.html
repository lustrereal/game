<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Game - Home</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #2c3e50;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 80px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      gap: 40px;
    }

    .sidebar button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar button:hover {
      background: #475569;
      transform: scale(1.1);
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .greeting {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .username {
      color: #a5b4fc;
    }

    /* Profile top-right */
    .profile {
      position: absolute;
      top: 20px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(30, 41, 59, 0.8);
      padding: 10px 16px;
      border-radius: 50px;
    }

    .profile-username {
      font-size: 18px;
      font-weight: bold;
    }

    .profile-pic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #64748b;
      border: 3px solid #a5b4fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Auth screen */
    #authScreen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 400;
    }

    #authScreen input {
      margin: 12px;
      padding: 14px;
      width: 300px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #666;
      background: #1e293b;
      color: white;
    }

    #authScreen button {
      margin: 10px;
      padding: 14px 40px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #loginBtn { background: #4CAF50; color: white; }
    #registerBtn { background: #2196F3; color: white; }

    #authMessage { color: #ff6b6b; margin-top: 10px; min-height: 24px; }

    /* Hide other screens initially */
    #modeSelect, #game {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Login/Register Screen – shown first -->
  <div id="authScreen">
    <h1>Multiplayer Square Game</h1>
    <input id="username" placeholder="Username" required minlength="3" maxlength="20">
    <input id="password" type="password" placeholder="Password" required minlength="6">
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <p id="authMessage"></p>
  </div>

  <!-- Mode Selection – shown after login -->
  <div id="modeSelect">
    <h1>Choose Game Mode</h1>
    <button id="normalBtn" class="mode-btn">Normal</button>
    <button id="tagBtn" class="mode-btn">Tag</button>
  </div>

  <!-- Home Page – shown after mode selection -->
  <div class="sidebar">
    <button>Home</button>
    <button>Friends</button>
    <button>Chat</button>
    <button>Settings</button>
  </div>

  <div class="main">
    <h1 class="greeting">
      Hello, <span id="displayUsername" class="username">(User)</span>
    </h1>

    <div class="profile">
      <span id="profileUsername" class="profile-username">(username)</span>
      <div class="profile-pic">P</div>
    </div>
  </div>

  <!-- Game content (hidden for now) -->
  <div id="game">
    <canvas id="canvas" width="960" height="720"></canvas>
    <canvas id="minimap" width="180" height="135"></canvas>

    <div id="chat">
      <ul id="messages"></ul>
      <div id="playersList" style="display:none;">
        <h4>Players</h4>
        <ul id="playerListUl"></ul>
      </div>
      <input id="chatInput" placeholder="Say something..." maxlength="100">
      <button id="sendBtn">Send</button>
    </div>

    <div id="inventory">
      <div>Inventory</div>
      <div id="slots"></div>
    </div>

    <div id="uiBars">
      <div class="bar-container">
        <div id="healthText">Health: 100/100</div>
        <div class="bar-outer"><div id="healthBar" class="bar-inner" style="width:100%; background:#2ecc71;"></div></div>
      </div>
      <div class="bar-container">
        <div id="staminaText">Stamina: 100/100</div>
        <div class="bar-outer"><div id="staminaBar" class="bar-inner" style="width:100%; background:#3498db;"></div></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
