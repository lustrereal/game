<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Square Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #2c3e50;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar – persistent */
    .sidebar {
      width: 80px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      padding-bottom: 20px;
      gap: 40px;
      z-index: 500;
    }

    .sidebar button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar button:hover {
      background: #475569;
      transform: scale(1.1);
    }

    .sidebar button.active {
      background: #64748b;
      box-shadow: 0 0 15px rgba(100, 116, 139, 0.6);
    }

    /* Main content area */
    .main-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Page containers */
    .page {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .page.active {
      display: flex;
    }

    /* Auth page */
    #authPage {
      background: rgba(0,0,0,0.85);
      z-index: 400;
    }

    #authPage input {
      margin: 12px;
      padding: 14px;
      width: 300px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #666;
      background: #1e293b;
      color: white;
    }

    #authPage button {
      margin: 10px;
      padding: 14px 40px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #loginBtn { background: #4CAF50; color: white; }
    #registerBtn { background: #2196F3; color: white; }

    #authMessage { color: #ff6b6b; margin-top: 10px; min-height: 24px; }

    /* Home page */
    #homePage .greeting {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .username { color: #a5b4fc; }

    /* Profile top-right */
    .profile {
      position: absolute;
      top: 20px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(30, 41, 59, 0.8);
      padding: 10px 16px;
      border-radius: 50px;
      z-index: 200;
    }

    .profile-username { font-size: 18px; font-weight: bold; }

    .profile-pic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #64748b;
      border: 3px solid #a5b4fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Editor page */
    #editorPage {
      background: #1a2533;
      padding: 20px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 20px;
    }

    .editor-tools {
      display: flex;
      gap: 15px;
    }

    .editor-tools button {
      padding: 10px 20px;
      background: #475569;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .editor-tools button:hover { background: #64748b; }

    .editor-canvas-container {
      width: 100%;
      height: 80vh;
      background: #0f172a;
      border: 2px solid #475569;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Game page */
    #gamePage {
      background: #228B22;
    }

    #canvas { display: block; margin: 0 auto; border: 2px solid #333; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <button data-page="home" class="active">Home</button>
    <button data-page="discover">Discover</button>
    <button data-page="friends">Friends</button>
    <button data-page="chat">Chat</button>
    <button data-page="settings">Settings</button>
    <button data-page="editor">Editor</button>
  </div>

  <!-- Pages -->
  <div class="main-content">

    <!-- Auth -->
    <div id="authPage" class="page active">
      <h1>Multiplayer Square Game</h1>
      <input id="username" placeholder="Username" required minlength="3" maxlength="20">
      <input id="password" type="password" placeholder="Password" required minlength="6">
      <button id="loginBtn">Login</button>
      <button id="registerBtn">Register</button>
      <p id="authMessage"></p>
    </div>

    <!-- Home -->
    <div id="homePage" class="page">
      <div class="main">
        <h1 class="greeting">
          Hello, <span id="displayUsername" class="username">(User)</span>
        </h1>
      </div>

      <div class="profile">
        <span id="profileUsername" class="profile-username">(username)</span>
        <div class="profile-pic">P</div>
      </div>
    </div>

    <!-- Editor -->
    <div id="editorPage" class="page">
      <div class="editor-header">
        <h1>Map & Game Editor</h1>
        <div class="editor-tools">
          <button id="saveBtn">Save</button>
          <button id="loadBtn">Load</button>
          <button id="publishBtn">Publish</button>
        </div>
      </div>

      <div class="editor-canvas-container">
        <canvas id="editorGrid"></canvas>
      </div>

      <p style="text-align:center; margin-top:10px; color:#94a3b8;">
        Click tiles to place blocks • Save your map • Publish when ready
      </p>
    </div>

    <!-- Game (placeholder) -->
    <div id="gamePage" class="page">
      <canvas id="canvas" width="960" height="720"></canvas>
      <!-- Chat, inventory, bars, etc. can go here -->
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
