<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Game - Home</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #2c3e50; /* Dark gray from your screenshot */
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: flex;
    }

    /* Left Sidebar */
    .sidebar {
      width: 80px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      gap: 40px;
    }

    .sidebar button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar button:hover {
      background: #475569;
      transform: scale(1.1);
    }

    /* Main Content Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .greeting {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .username {
      color: #a5b4fc;
    }

    /* Top-right Profile */
    .profile {
      position: absolute;
      top: 20px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(30, 41, 59, 0.8);
      padding: 10px 16px;
      border-radius: 50px;
    }

    .profile-username {
      font-size: 18px;
      font-weight: bold;
    }

    .profile-pic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #64748b;
      border: 3px solid #a5b4fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Hide game elements for now */
    #game, #canvas, #minimap, #chat, #inventory, #uiBars {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Left Sidebar Navigation -->
  <div class="sidebar">
    <button>Home</button>
    <button>Friends</button>
    <button>Chat</button>
    <button>Settings</button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1 class="greeting">
      Hello, <span class="username">(User)</span>
    </h1>

    <!-- Top-right Profile -->
    <div class="profile">
      <span class="profile-username">(username)</span>
      <div class="profile-pic">P</div> <!-- Replace P with actual profile picture later -->
    </div>
  </div>

  <!-- Game elements (hidden for now) -->
  <div id="game">
    <canvas id="canvas" width="960" height="720"></canvas>
    <canvas id="minimap" width="180" height="135"></canvas>
    <div id="chat">
      <ul id="messages"></ul>
      <div id="playersList" style="display:none;">
        <h4>Players</h4>
        <ul id="playerListUl"></ul>
      </div>
      <input id="chatInput" placeholder="Say something..." maxlength="100">
      <button id="sendBtn">Send</button>
    </div>
    <div id="inventory">
      <div>Inventory</div>
      <div id="slots"></div>
    </div>
    <div id="uiBars">
      <div class="bar-container">
        <div id="healthText">Health: 100/100</div>
        <div class="bar-outer"><div id="healthBar" class="bar-inner" style="width:100%; background:#2ecc71;"></div></div>
      </div>
      <div class="bar-container">
        <div id="staminaText">Stamina: 100/100</div>
        <div class="bar-outer"><div id="staminaBar" class="bar-inner" style="width:100%; background:#3498db;"></div></div>
      </div>
    </div>
  </div>

  <!-- Login screen (hidden for now - will be shown on first load later) -->
  <div id="authScreen" style="display:none;">
    <!-- Your login/register form here when ready -->
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
