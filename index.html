<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #2c3e50;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar – always visible on home/editor */
    .sidebar {
      width: 80px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      padding-bottom: 20px;
      gap: 40px;
      z-index: 500;
    }

    .sidebar button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar button:hover {
      background: #475569;
      transform: scale(1.1);
    }

    .sidebar button.active {
      background: #64748b;
      box-shadow: 0 0 15px rgba(100, 116, 139, 0.6);
    }

    /* Main content area */
    .content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Screens */
    #authScreen, #modeSelect, #homeScreen, #editorScreen, #gameScreen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #authScreen { background: rgba(0,0,0,0.85); z-index: 400; }
    #modeSelect { background: rgba(44, 62, 80, 0.95); z-index: 300; }

    /* Home screen */
    #homeScreen .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .greeting {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .username {
      color: #a5b4fc;
    }

    /* Profile top-right */
    .profile {
      position: absolute;
      top: 20px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(30, 41, 59, 0.8);
      padding: 10px 16px;
      border-radius: 50px;
      z-index: 200;
    }

    .profile-username {
      font-size: 18px;
      font-weight: bold;
    }

    .profile-pic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #64748b;
      border: 3px solid #a5b4fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Editor screen */
    #editorScreen {
      background: #1a2533;
      padding: 20px;
      overflow: auto;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 20px;
    }

    .editor-header h1 {
      margin: 0;
    }

    .editor-tools {
